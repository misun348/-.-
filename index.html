<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 1인칭 말 날리기 게임 (코스믹 싱귤래리티 에디션)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0f3f8; font-family: 'Malgun Gothic', sans-serif; user-select: none; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: #111122;
            text-shadow: 1px 1px 3px rgba(255,255,255,0.8); pointer-events: none; z-index: 10;
        }
        h1 { margin: 0 0 5px 0; font-size: 26px; color: #440088; text-transform: uppercase; }
        p { margin: 4px 0; font-size: 13px; color: #222233; font-weight: bold; }
        
        #ult-hud {
            position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9); border: 3px solid #8800cc;
            padding: 10px 30px; border-radius: 12px; color: #440088; font-weight: bold;
            font-size: 16px; text-shadow: 0 0 8px rgba(136,0,204,0.3); z-index: 10;
            box-shadow: 0 4px 20px rgba(136,0,204,0.2);
        }

        #weapon-hud {
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 5px; background: rgba(255,255,255,0.95);
            padding: 12px 18px; border-radius: 15px; border: 2px solid #cc0044; z-index: 10;
            flex-wrap: wrap; justify-content: center; width: 88%; box-shadow: 0 6px 15px rgba(0,0,0,0.15);
        }
        .slot {
            width: 85px; padding: 6px 3px; background: #e8ecf4; color: #555577;
            text-align: center; border-radius: 6px; font-size: 11px; font-weight: bold;
            transition: all 0.1s ease-out; border: 1px solid #ccd4e0;
        }
        .slot.active {
            background: #cc0044; color: white; border-color: #ffffff;
            box-shadow: 0 0 15px #cc0044; transform: scale(1.12) translateY(-4px);
        }
        .slot-num { font-size: 12px; display: block; color: #ff9900; }
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 10px; height: 10px;
            border: 2px solid #00aa99; border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; box-shadow: 0 0 6px #00aa99; z-index: 10;
        }
    </style>
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/cannon@0.6.2/build/cannon.min.js"></script>
</head>
<body>

    <div id="ui">
        <h1>🌌 COSMIC SINGULARITY UPDATE</h1>
        <p><b>🧲 초고밀도 압착:</b> 수축 기간 동안 모든 대상을 초점 하나로 융합 압축</p>
        <p><b>💥 빅뱅 디스인티그레이션:</b> 블랙홀이 한계 수축 후 팽창할 때 말들이 동시 파편화 폭발</p>
        <p><b>🔭 하이퍼 메가 스케일:</b> 이펙트 범위 250m 및 카메라 진동 충격 극대화</p>
        <p style="margin-top:5px; font-size:16px;">실시간 고도: <span id="height-score" style="color:#cc0044; font-weight:bold;">0</span> m</p>
    </div>

    <div id="ult-hud">초질량 블랙홀 [F]: READY</div>

    <div id="weapon-hud">
        <div class="slot active" id="w1"><span class="slot-num">1</span>핵해머</div>
        <div class="slot" id="w2"><span class="slot-num">2</span>갓뚫어뻥</div>
        <div class="slot" id="w3"><span class="slot-num">3</span>자력글러브</div>
        <div class="slot" id="w4"><span class="slot-num">4</span>플라즈마채찍</div>
        <div class="slot" id="w5"><span class="slot-num">5</span>하이퍼바주카</div>
        <div class="slot" id="w6"><span class="slot-num">6</span>융합TNT</div>
        <div class="slot" id="w7"><span class="slot-num">7</span>코스믹블랙홀</div>
        <div class="slot" id="w8"><span class="slot-num">8</span>염병선마검</div>
        <div class="slot" id="w9"><span class="slot-num">9</span>제트타이푼</div>
        <div class="slot" id="w10"><span class="slot-num">10</span>64기가분쇄</div>
    </div>

    <div id="crosshair"></div>

    <script>
        // --- 1. 코어 인프라 셋업 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xeef2f7); 
        scene.fog = new THREE.FogExp2(0xeef2f7, 0.002);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.rotation.order = 'YXZ';

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const world = new CANNON.World();
        world.gravity.set(0, -45, 0); 

        scene.add(new THREE.AmbientLight(0xffffff, 0.9));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.4);
        dirLight.position.set(50, 200, 50);
        scene.add(dirLight);

        let currentWeapon = 1;

        const redMat = new THREE.MeshStandardMaterial({ color: 0xff1155, roughness: 0.1 });
        const horseMat = new THREE.MeshStandardMaterial({ color: 0x4a2e2b, roughness: 0.6 });
        const steelMat = new THREE.MeshStandardMaterial({ color: 0x444455, metalness: 0.7 });
        const cosmicMat = new THREE.MeshBasicMaterial({ color: 0x8800ff, wireframe: true });
        const bladeMat = new THREE.MeshStandardMaterial({ color: 0x333344, metalness: 0.9 });
        const windMat = new THREE.MeshBasicMaterial({ color: 0x00bb99, transparent: true, opacity: 0.25, wireframe: true });
        const giantMat = new THREE.MeshStandardMaterial({ color: 0xcc0044, metalness: 0.5 });
        
        // 블랙홀 비주얼 강화 스케일
        const blackHoleCoreMat = new THREE.MeshBasicMaterial({ color: 0x010101 }); 
        const blackHoleRingMat = new THREE.MeshBasicMaterial({ color: 0x5500dd, side: THREE.DoubleSide, wireframe: true });

        // 플레이어
        const playerBody = new CANNON.Body({ mass: 65, shape: new CANNON.Sphere(1.2) });
        playerBody.position.set(0, 6, 0); playerBody.linearDamping = 0.65; playerBody.fixedRotation = true;
        world.addBody(playerBody);

        const weaponContainer = new THREE.Group();
        scene.add(weaponContainer);

        const buildWeapon = (geo, mat, px, py, pz, rx=0) => {
            const g = new THREE.Group(); const m = new THREE.Mesh(geo, mat);
            m.position.set(px, py, pz); if(rx) m.rotation.x = rx; g.add(m); weaponContainer.add(g); return g;
        };

        const hammerMesh = buildWeapon(new THREE.CylinderGeometry(0.04, 0.04, 1.3), steelMat, 0.35, -0.4, -0.7);
        const plungerMesh = buildWeapon(new THREE.BoxGeometry(0.18, 0.18, 0.6), steelMat, 0.35, -0.35, -0.7);
        const gloveMesh = buildWeapon(new THREE.SphereGeometry(0.25, 16, 16), redMat, 0.35, -0.35, -0.7);
        const whipMesh = buildWeapon(new THREE.CylinderGeometry(0.01, 0.01, 1.2), cosmicMat, 0.35, -0.1, -0.8);
        const bazookaMesh = buildWeapon(new THREE.CylinderGeometry(0.18, 0.2, 1.4), steelMat, 0.35, -0.35, -0.8, Math.PI/2);
        const tntMesh = buildWeapon(new THREE.BoxGeometry(0.25, 0.45, 0.25), redMat, 0.35, -0.4, -0.7);
        const roseLineMesh = buildWeapon(new THREE.SphereGeometry(0.16, 16, 16), cosmicMat, 0.35, -0.35, -0.7);
        const ninjaBladeMesh = buildWeapon(new THREE.BoxGeometry(0.015, 0.06, 1.6), bladeMat, 0.4, -0.2, -1.0, Math.PI/6);
        const windGunMesh = buildWeapon(new THREE.CylinderGeometry(0.14, 0.09, 1.0, 16), steelMat, 0.35, -0.35, -0.7, Math.PI/2);
        const giantGunMesh = buildWeapon(new THREE.CylinderGeometry(0.06, 0.22, 1.1, 16), giantMat, 0.35, -0.35, -0.7, Math.PI/2);

        let animAction = false; let animProgress = 0;

        function updateWeaponHUD() {
            hammerMesh.visible = (currentWeapon === 1); plungerMesh.visible = (currentWeapon === 2);
            gloveMesh.visible = (currentWeapon === 3); whipMesh.visible = (currentWeapon === 4);
            bazookaMesh.visible = (currentWeapon === 5); tntMesh.visible = (currentWeapon === 6);
            roseLineMesh.visible = (currentWeapon === 7); ninjaBladeMesh.visible = (currentWeapon === 8);
            windGunMesh.visible = (currentWeapon === 9); giantGunMesh.visible = (currentWeapon === 10);
        }
        updateWeaponHUD();

        // --- 4. 엔티티 데이터 시스템 ---
        const horses = [];
        const debrisPieces = []; 
        const fxParticles = [];  
        const realExplosions = []; 
        const respawnQueue = []; 

        function createRealHorseMesh() {
            const horseGroup = new THREE.Group(); const normalGroup = new THREE.Group();
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.85, 0.85, 2.6, 16), horseMat); body.rotation.x = Math.PI / 2; normalGroup.add(body);
            const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.45, 0.6, 1.5, 16), horseMat); neck.position.set(0, 1.0, -1.1); neck.rotation.x = Math.PI / 3.5; normalGroup.add(neck);
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 16), horseMat); head.scale.set(1, 1, 1.7); head.position.set(0, 1.8, -1.8); normalGroup.add(head);
            const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.14, 0.09, 1.5, 8), horseMat); leg.position.set(0.55, -1.2, -0.9);
            const l1 = leg.clone(); const l2 = leg.clone(); l2.position.x = -0.55; const l3 = leg.clone(); l3.position.z = 0.9; const l4 = l2.clone(); l4.position.z = 0.9;
            normalGroup.add(l1, l2, l3, l4); horseGroup.add(normalGroup);
            const xrayGroup = new THREE.Group(); const xrayBody = new THREE.Mesh(new THREE.CylinderGeometry(0.86, 0.86, 2.6, 16), cosmicMat); xrayBody.rotation.x = Math.PI/2; xrayGroup.add(xrayBody); xrayGroup.visible = false; horseGroup.add(xrayGroup);
            return { horseGroup, normalGroup, xrayGroup };
        }

        function spawnHorse(x, y, z, originX = null, originY = null, originZ = null) {
            const hData = createRealHorseMesh(); scene.add(hData.horseGroup);
            const body = new CANNON.Body({ mass: 15, shape: new CANNON.Box(new CANNON.Vec3(0.9, 1.2, 1.7)) }); body.position.set(x, y, z);
            world.addBody(body);
            horses.push({
                mesh: hData.horseGroup, normal: hData.normalGroup, xray: hData.xrayGroup,
                body: body, state: "normal", timer: 0, shakeTime: 0,
                growth: 1.0, isGrowing: false,
                originPos: { x: originX ?? x, y: originY ?? y, z: originZ ?? z } 
            });
        }

        function spawnSparkFlash(pos, count = 30, colorType = 0) {
            for (let i = 0; i < count; i++) {
                const geo = new THREE.BoxGeometry(0.25, 0.25, 0.25);
                let col = 0xcc0044;
                if(colorType === 1) col = Math.random() > 0.4 ? 0xff5500 : 0xffaa00;
                if(colorType === 2) col = Math.random() > 0.5 ? 0x6600cc : 0x00aaff;
                if(colorType === 3) col = Math.random() > 0.3 ? 0xcc0044 : 0xffaa00;

                const mesh = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: col }));
                mesh.position.copy(pos); scene.add(mesh);
                fxParticles.push({
                    mesh, vx: (Math.random() - 0.5) * 60, vy: (Math.random() - 0.5) * 55 + 15, vz: (Math.random() - 0.5) * 60,
                    life: 0.4 + Math.random() * 0.5
                });
            }
        }

        function sliceHorseIntoPieces(pos, count = 24, customMat = horseMat) {
            for (let i = 0; i < count; i++) {
                const geo = new THREE.ConeGeometry(0.25, 0.7, 5);
                const mesh = new THREE.Mesh(geo, customMat); mesh.position.copy(pos);
                mesh.position.x += (Math.random() - 0.5) * 3.0; mesh.position.y += (Math.random() - 0.5) * 3.0; mesh.position.z += (Math.random() - 0.5) * 3.0;
                scene.add(mesh);

                const pBody = new CANNON.Body({ mass: 1.2, shape: new CANNON.Sphere(0.3) });
                pBody.position.copy(mesh.position);
                pBody.velocity.set((Math.random() - 0.5) * 110, Math.random() * 60 + 30, (Math.random() - 0.5) * 110);
                world.addBody(pBody);
                debrisPieces.push({ mesh, body: pBody, life: 2.5 });
            }
        }

        // 발판 스폰 규칙
        const platforms = []; let nextPlatformY = 0; let nextPlatformZ = 0;
        function spawnPlatform() {
            const w = 24; const h = 3; const d = 24; const x = (Math.random() - 0.5) * 26; const y = nextPlatformY; const z = nextPlatformZ;
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshStandardMaterial({ color: 0xd0d7e2, roughness: 0.5 }));
            mesh.position.set(x, y, z); mesh.receiveShadow = true; scene.add(mesh);
            const b = new CANNON.Body({ mass: 0, shape: new CANNON.Box(new CANNON.Vec3(w/2, h/2, d/2)) }); b.position.set(x, y, z); world.addBody(b);
            platforms.push({ mesh, body: b, zPosition: z });
            
            for(let i=0; i<6; i++) { 
                spawnHorse(x + (Math.random()-0.5)*14, y + 4, z + (Math.random()-0.5)*14); 
            }
            nextPlatformY += 6; nextPlatformZ -= 24; 
        }
        for(let i=0; i<15; i++) { spawnPlatform(); }


        // --- 5. 인풋 및 궁극기 관리 스케줄러 ---
        let targetYaw = 0; let targetPitch = 0; let currentYaw = 0; let currentPitch = 0; let camShakeIntensity = 0;
        let isMouseDown = false;
        
        let ultCooldown = 0; 
        let ultState = "none"; 
        let ultTime = 0;
        
        let ultContainer = null;
        let ultCoreMesh = null;
        let ultRingMesh = null;
        const ultPos = new THREE.Vector3();

        window.addEventListener('click', (e) => { if (e.clientY < window.innerHeight - 100) document.body.requestPointerLock(); });
        window.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === document.body) {
                targetYaw -= e.movementX * 0.0020; targetPitch -= e.movementY * 0.0020; 
                targetPitch = Math.max(-Math.PI/2.4, Math.min(Math.PI/2.4, targetPitch));
            }
        });

        window.addEventListener('mousedown', (e) => { if(e.button === 0) isMouseDown = true; });
        window.addEventListener('mouseup', (e) => { if(e.button === 0) isMouseDown = false; });

        const keys = { w: false, a: false, s: false, d: false, space: false };
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') keys.w = true; if (key === 'a') keys.a = true; if (key === 's') keys.s = true; if (key === 'd') keys.d = true;
            if (e.key === ' ') keys.space = true;
            if (['1','2','3','4','5','6','7','8','9','0'].includes(e.key)) {
                document.getElementById(`w${currentWeapon}`).classList.remove('active');
                currentWeapon = e.key === '0' ? 10 : parseInt(e.key);
                document.getElementById(`w${currentWeapon}`).classList.add('active');
                updateWeaponHUD();
            }
            
            // [F] 하이퍼 메가 초질량 블랙홀 발동
            if (key === 'f' && ultCooldown <= 0 && ultState === "none") {
                const viewDir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
                ultPos.copy(camera.position).add(viewDir.multiplyScalar(38)); // 더 멀리 거대하게 배치
                
                ultContainer = new THREE.Group();
                ultContainer.position.copy(ultPos);
                
                // 코어 스케일 메가 진화
                ultCoreMesh = new THREE.Mesh(new THREE.SphereGeometry(15.0, 32, 32), blackHoleCoreMat);
                ultContainer.add(ultCoreMesh);
                
                ultRingMesh = new THREE.Mesh(new THREE.TorusGeometry(22.0, 1.8, 8, 48), blackHoleRingMat);
                ultRingMesh.rotation.x = Math.PI / 2.3; 
                ultContainer.add(ultRingMesh);
                
                scene.add(ultContainer);
                
                ultState = "suck";
                ultTime = 3.5; 
                ultCooldown = 30.0; 
            }
        });
        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') keys.w = false; if (key === 'a') keys.a = false; if (key === 's') keys.s = false; if (key === 'd') keys.d = false;
            if (e.key === ' ') keys.space = false;
        });


        // --- 6. 일반 충격 레이어 ---
        const raycaster = new THREE.Raycaster();
        let activeTNTMesh = null; let activeTNTBody = null;
        let activeBlackholeMesh = null; let blackholeState = "none"; let blackholeTime = 0; const blackholePos = new THREE.Vector3();

        window.addEventListener('mousedown', (e) => {
            if (document.pointerLockElement !== document.body || e.button !== 0) return;
            if(!animAction) { animAction = true; animProgress = 0; }

            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const intersects = raycaster.intersectObjects(scene.children, true);

            if (intersects.length > 0) {
                const hitPoint = intersects[0].point;
                const distance = intersects[0].distance; 

                const isMelee = [1, 2, 3, 4, 8, 10].includes(currentWeapon);
                if (isMelee && distance > 4.5) return; 

                let hitHorse = null; let hitHorseIndex = -1;
                for (let i = 0; i < horses.length; i++) {
                    if (intersects[0].object.id && horses[i].mesh.getObjectById(intersects[0].object.id)) {
                        hitHorse = horses[i]; hitHorseIndex = i; break;
                    }
                }

                if (currentWeapon === 1 && hitHorse) {
                    camShakeIntensity = 0.7; spawnSparkFlash(hitPoint, 25, 0);
                    hitHorse.state = "hammer_flat"; hitHorse.timer = 2.0; hitHorse.body.velocity.set(0, -15, 0);
                    return;
                }
                if (currentWeapon === 2 && hitHorse) {
                    camShakeIntensity = 0.55; spawnSparkFlash(hitPoint, 15, 3);
                    hitHorse.body.velocity.set(0, 48, 0); 
                    const stickP = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.16, 0.5, 16), redMat);
                    stickP.position.set(0, 1.5, -1.8); stickP.rotation.x = Math.PI/2;
                    hitHorse.mesh.add(stickP);
                    return;
                }
                if (currentWeapon === 3 && hitHorse) {
                    camShakeIntensity = 0.65; spawnSparkFlash(hitHorse.body.position, 25, 2);
                    hitHorse.state = "magnet_shake"; hitHorse.shakeTime = 2.5;
                    return;
                }
                if (currentWeapon === 4 && hitHorse) {
                    camShakeIntensity = 0.7; spawnSparkFlash(hitPoint, 30, 2);
                    hitHorse.state = "plasma_xray"; hitHorse.timer = 1.8;
                    hitHorse.normal.visible = false; hitHorse.xray.visible = true;
                    return;
                }
                if (currentWeapon === 5) {
                    camShakeIntensity = 0.95; spawnSparkFlash(hitPoint, 45, 1);
                    const expBall = new THREE.Mesh(new THREE.SphereGeometry(5.0, 16, 16), new THREE.MeshBasicMaterial({ color: 0xcc0044, transparent: true, opacity: 0.85 }));
                    expBall.position.copy(hitPoint); scene.add(expBall);
                    const expRing = new THREE.Mesh(new THREE.RingGeometry(0.2, 6.5, 32), new THREE.MeshBasicMaterial({ color: 0xffaa00, side: THREE.DoubleSide, transparent: true, opacity: 0.75 }));
                    expRing.position.copy(hitPoint); expRing.rotation.x = Math.PI/2; scene.add(expRing);
                    realExplosions.push({ ball: expBall, ring: expRing, progress: 0, maxLife: 0.55 });

                    horses.forEach(h => {
                        if (h.body.position.distanceTo(new CANNON.Vec3(hitPoint.x, hitPoint.y, hitPoint.z)) < 30) {
                            const dir = h.body.position.vsub(new CANNON.Vec3(hitPoint.x, hitPoint.y, hitPoint.z)); dir.normalize(); dir.y += 0.7;
                            h.body.applyImpulse(dir.scale(320), h.body.position);
                        }
                    });
                    return;
                }
                if (currentWeapon === 6) {
                    if (activeTNTMesh && activeTNTBody) {
                        camShakeIntensity = 1.1; const tntPos = activeTNTBody.position;
                        spawnSparkFlash(tntPos, 50, 1);
                        const expBall = new THREE.Mesh(new THREE.SphereGeometry(6.5, 16, 16), new THREE.MeshBasicMaterial({ color: 0xcc0044, transparent: true, opacity: 0.85 }));
                        expBall.position.copy(tntPos); scene.add(expBall);
                        const expRing = new THREE.Mesh(new THREE.RingGeometry(0.2, 8.0, 32), new THREE.MeshBasicMaterial({ color: 0xffaa00, side: THREE.DoubleSide, transparent: true, opacity: 0.7 }));
                        expRing.position.copy(tntPos); expRing.rotation.x = Math.PI/2; scene.add(expRing);
                        realExplosions.push({ ball: expBall, ring: expRing, progress: 0, maxLife: 0.6 });

                        horses.forEach(h => {
                            if (h.body.position.distanceTo(tntPos) < 32) {
                                const dir = h.body.position.vsub(tntPos); dir.normalize(); dir.y += 0.8; h.body.applyImpulse(dir.scale(450), h.body.position);
                            }
                        });
                        scene.remove(activeTNTMesh); world.remove(activeTNTBody); activeTNTMesh = null; activeTNTBody = null;
                    } else {
                        const tntBoxGroup = new THREE.Group();
                        tntBoxGroup.add(new THREE.Mesh(new THREE.BoxGeometry(1.2,1.4,1.2), new THREE.MeshStandardMaterial({color:0xcc0044, roughness:0.1})));
                        tntBoxGroup.position.copy(hitPoint); tntBoxGroup.position.y += 0.7; scene.add(tntBoxGroup); activeTNTMesh = tntBoxGroup;
                        activeTNTBody = new CANNON.Body({ mass: 0, shape: new CANNON.Box(new CANNON.Vec3(0.6,0.7,0.6)) });
                        activeTNTBody.position.copy(activeTNTMesh.position); world.addBody(activeTNTBody);
                    }
                    return;
                }
                if (currentWeapon === 7 && blackholeState === "none") {
                    blackholePos.copy(hitPoint);
                    activeBlackholeMesh = new THREE.Mesh(new THREE.SphereGeometry(4.0, 24, 24), cosmicMat);
                    activeBlackholeMesh.position.copy(blackholePos); scene.add(activeBlackholeMesh);
                    blackholeState = "suck"; blackholeTime = 2.5; 
                    return;
                }
                if (currentWeapon === 8 && hitHorse) {
                    camShakeIntensity = 0.85; const savePos = new THREE.Vector3().copy(hitHorse.body.position);
                    const savedOrigin = Object.assign({}, hitHorse.originPos);
                    scene.remove(hitHorse.mesh); world.remove(hitHorse.body); horses.splice(hitHorseIndex, 1);
                    sliceHorseIntoPieces(savePos, 24, horseMat);
                    respawnQueue.push({ time: 10.0, pos: savedOrigin });
                    return;
                }
                if (currentWeapon === 10 && hitHorse && !hitHorse.isGrowing) {
                    hitHorse.isGrowing = true;
                    return;
                }
            }
        });


        // --- 7. 메인 렌더 프레임 및 블랙홀 코스믹 물리 핵심 모듈 ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            world.step(1 / 60);

            if (ultCooldown > 0) {
                ultCooldown -= delta;
                document.getElementById('ult-hud').innerText = `초질량 블랙홀 [F]: ${Math.ceil(ultCooldown)}초`;
            } else {
                document.getElementById('ult-hud').innerText = `초질량 블랙홀 [F]: READY`;
            }

            for (let i = respawnQueue.length - 1; i >= 0; i--) {
                respawnQueue[i].time -= delta;
                if (respawnQueue[i].time <= 0) {
                    const p = respawnQueue[i].pos;
                    spawnHorse(p.x, p.y + 4, p.z, p.x, p.y, p.z); 
                    respawnQueue.splice(i, 1);
                }
            }

            currentYaw += (targetYaw - currentYaw) * 0.24; currentPitch += (targetPitch - currentPitch) * 0.24;
            camera.rotation.set(currentPitch, currentYaw, 0);

            if (camShakeIntensity > 0) {
                camera.rotation.x += (Math.random() - 0.5) * camShakeIntensity; camera.rotation.y += (Math.random() - 0.5) * camShakeIntensity;
                camShakeIntensity *= 0.84; 
            }

            const forwardVec = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion); forwardVec.y = 0; forwardVec.normalize();
            const rightVec = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion); rightVec.y = 0; rightVec.normalize();
            const moveSpeed = 20; let finalVelocityX = 0; let finalVelocityZ = 0;
            if (keys.w) { finalVelocityX += forwardVec.x; finalVelocityZ += forwardVec.z; }
            if (keys.s) { finalVelocityX -= forwardVec.x; finalVelocityZ -= forwardVec.z; }
            if (keys.a) { finalVelocityX -= rightVec.x; finalVelocityZ -= rightVec.z; }
            if (keys.d) { finalVelocityX += rightVec.x; finalVelocityZ += rightVec.z; }
            if (finalVelocityX !== 0 || finalVelocityZ !== 0) {
                const len = Math.sqrt(finalVelocityX*finalVelocityX + finalVelocityZ*finalVelocityZ);
                playerBody.velocity.x = (finalVelocityX / len) * moveSpeed; playerBody.velocity.z = (finalVelocityZ / len) * moveSpeed;
            } else { playerBody.velocity.x *= 0.12; playerBody.velocity.z *= 0.12; }
            if (keys.space && Math.abs(playerBody.velocity.y) < 0.2) playerBody.velocity.y = 35;

            camera.position.set(playerBody.position.x, playerBody.position.y + 0.8, playerBody.position.z);
            weaponContainer.position.copy(camera.position); weaponContainer.rotation.copy(camera.rotation);

            [hammerMesh, plungerMesh, gloveMesh, whipMesh, bazookaMesh, tntMesh, roseLineMesh, ninjaBladeMesh, windGunMesh, giantGunMesh].forEach(m => { m.position.set(0,0,0); m.rotation.set(0,0,0); });

            if (currentWeapon === 9 && isMouseDown) {
                const fireDir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
                const wParticle = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.5, 5.0, 4), windMat);
                wParticle.position.copy(camera.position).add(fireDir.clone().multiplyScalar(2.0)); wParticle.rotation.copy(camera.rotation); scene.add(wParticle);
                fxParticles.push({ mesh: wParticle, vx: fireDir.x*85, vy: fireDir.y*85, vz: fireDir.z*85, life: 0.25 });

                horses.forEach(h => {
                    const toHorse = h.body.position.vsub(new CANNON.Vec3(camera.position.x, camera.position.y, camera.position.z));
                    if (toHorse.length() < 65) {
                        toHorse.normalize();
                        if ((toHorse.x*fireDir.x + toHorse.y*fireDir.y + toHorse.z*fireDir.z) > 0.90) { 
                            h.body.applyImpulse(new CANNON.Vec3(fireDir.x*65, fireDir.y*25 + 12, fireDir.z*65), h.body.position);
                        }
                    }
                });
            }

            // 🪐 궁극기 블랙홀 상태 머신 엔진 고도화
            const cPos = new CANNON.Vec3(ultPos.x, ultPos.y, ultPos.z);
            
            if (ultState === "suck") {
                ultTime -= delta;
                if(ultRingMesh) ultRingMesh.rotation.z += 0.45; 
                
                // [수축 심화]: 중심점에 오차 없이 강제 정렬하여 밀집시키는 중력식 변경
                horses.forEach(h => {
                    if (h.body.position.distanceTo(cPos) < 250) { // 스케일 250m로 조율
                        const pullDir = cPos.vsub(h.body.position);
                        const dist = pullDir.length();
                        pullDir.normalize();
                        
                        // 가까워질수록 초광속으로 중앙 한 점에 압착
                        const forceFactor = Math.max(120, 350 - dist * 1.5);
                        h.body.velocity.set(pullDir.x * forceFactor, pullDir.y * forceFactor, pullDir.z * forceFactor);
                    }
                });
                if (ultTime <= 0) { ultState = "implode"; ultTime = 1.8; } 
            }
            else if (ultState === "implode") {
                ultTime -= delta;
                
                // 1.8초 동안 말들을 싱귤래리티(중앙 점)에 단단히 모아둔 채 서서히 수축 감상
                const scaleRatio = Math.max(0.01, ultTime / 1.8); 
                if(ultContainer) ultContainer.scale.set(scaleRatio, scaleRatio, scaleRatio);
                
                horses.forEach(h => {
                    if (h.body.position.distanceTo(cPos) < 60) {
                        // 수축 단계 구속: 강제로 중심 좌표에 고정 수렴
                        h.body.position.set(
                            THREE.MathUtils.lerp(h.body.position.x, ultPos.x, 0.25),
                            THREE.MathUtils.lerp(h.body.position.y, ultPos.y, 0.25),
                            THREE.MathUtils.lerp(h.body.position.z, ultPos.z, 0.25)
                        );
                        h.body.velocity.set(0, 0, 0); // 날아가지 못하게 힘 상쇄
                    }
                });
                
                // 임플로전 끝 -> 대폭발(빅뱅 팽창)과 동시에 파편화
                if (ultTime <= 0) {
                    camShakeIntensity = 4.5; // 거대한 화면 진동
                    
                    // 은백색 배경을 가르는 우주 파괴 링 사출
                    const bigBangVisual = new THREE.Mesh(new THREE.SphereGeometry(65, 32, 32), new THREE.MeshBasicMaterial({ color: 0x4400aa, transparent: true, opacity: 0.85, wireframe: true }));
                    bigBangVisual.position.copy(ultPos); scene.add(bigBangVisual); setTimeout(() => scene.remove(bigBangVisual), 800);
                    
                    // 한곳에 융합되어 있던 말들을 역순으로 동시 파쇄 폭발!!
                    for (let i = horses.length - 1; i >= 0; i--) {
                        const h = horses[i];
                        if (h.body.position.distanceTo(cPos) < 15) {
                            const savePos = new THREE.Vector3().copy(h.body.position);
                            const savedOrigin = Object.assign({}, h.originPos);
                            
                            // 메모리 해제 및 동시 다발적 조각 분출
                            scene.remove(h.mesh); world.remove(h.body); 
                            horses.splice(i, 1);
                            
                            sliceHorseIntoPieces(savePos, 35, giantMat); // 보라빛 파편 폭풍 형성
                            respawnQueue.push({ time: 12.0, pos: savedOrigin });
                        }
                    }
                    
                    scene.remove(ultContainer); ultContainer = null; ultState = "none";
                }
            }

            if (animAction) {
                animProgress += delta * 9.5;
                if (animProgress > Math.PI) { animAction = false; animProgress = 0; }
                else {
                    const sinVal = Math.sin(animProgress);
                    if (currentWeapon === 1) hammerMesh.rotation.x = sinVal * 1.3;
                    if (currentWeapon === 5) bazookaMesh.position.z = sinVal * 0.45;
                    if (currentWeapon === 8) { ninjaBladeMesh.rotation.z = -sinVal * 2.2; ninjaBladeMesh.rotation.y = sinVal * 1.2; }
                    if (currentWeapon === 10) giantGunMesh.position.z = sinVal * 0.5;
                }
            }

            for (let i = realExplosions.length - 1; i >= 0; i--) {
                const exp = realExplosions[i]; exp.progress += delta; const ratio = exp.progress / exp.maxLife;
                exp.ball.scale.set(1 + ratio*2.8, 1 + ratio*2.8, 1 + ratio*2.8); exp.ball.material.opacity = 1.0 - ratio;
                exp.ring.scale.set(1 + ratio*7.0, 1 + ratio*7.0, 1 + ratio*7.0); exp.ring.material.opacity = 0.9 - ratio;
                if (exp.progress >= exp.maxLife) { scene.remove(exp.ball); scene.remove(exp.ring); realExplosions.splice(i, 1); }
            }
            for (let i = fxParticles.length - 1; i >= 0; i--) {
                const p = fxParticles[i]; p.mesh.position.x += p.vx * delta; p.mesh.position.y += p.vy * delta; p.mesh.position.z += p.vz * delta;
                p.life -= delta; if (p.life <= 0) { scene.remove(p.mesh); fxParticles.splice(i, 1); }
            }
            for (let i = debrisPieces.length - 1; i >= 0; i--) {
                const p = debrisPieces[i]; p.mesh.position.copy(p.body.position); p.mesh.quaternion.copy(p.body.quaternion);
                p.life -= delta; if (p.life <= 0) { scene.remove(p.mesh); world.remove(p.body); debrisPieces.splice(i, 1); }
            }

            if (blackholeState === "suck") {
                blackholeTime -= delta; activeBlackholeMesh.rotation.y += 0.12;
                horses.forEach(h => {
                    const cbPos = new CANNON.Vec3(blackholePos.x, blackholePos.y, blackholePos.z);
                    if (h.body.position.distanceTo(cbPos) < 38) {
                        const pullDir = cbPos.vsub(h.body.position); pullDir.normalize(); h.body.velocity.set(pullDir.x * 25, pullDir.y * 18 + 6, pullDir.z * 25); 
                    }
                });
                if (blackholeTime <= 0) { blackholeState = "implode"; blackholeTime = 0.6; }
            }
            else if (blackholeState === "implode") {
                blackholeTime -= delta; const scaleRatio = blackholeTime / 0.6; activeBlackholeMesh.scale.set(scaleRatio, scaleRatio, scaleRatio);
                if (blackholeTime <= 0) {
                    const bigBangVisual = new THREE.Mesh(new THREE.SphereGeometry(9,16,16), new THREE.MeshBasicMaterial({ color: 0x00bb99, transparent: true, opacity: 0.8 })); bigBangVisual.position.copy(blackholePos); scene.add(bigBangVisual); setTimeout(() => scene.remove(bigBangVisual), 450);
                    horses.forEach(h => {
                        const cbPos = new CANNON.Vec3(blackholePos.x, blackholePos.y, blackholePos.z);
                        if (h.body.position.distanceTo(cbPos) < 22) {
                            const pushDir = h.body.position.vsub(cbPos); pushDir.normalize(); pushDir.y += 0.9; h.body.applyImpulse(pushDir.scale(550), h.body.position);
                        }
                    });
                    scene.remove(activeBlackholeMesh); activeBlackholeMesh = null; blackholeState = "none";
                }
            }

            for (let i = horses.length - 1; i >= 0; i--) {
                const h = horses[i];
                
                if (h.body.position.y < -30 && !h.isGrowing) {
                    const savedOrigin = Object.assign({}, h.originPos);
                    scene.remove(h.mesh); world.remove(h.body); horses.splice(i, 1);
                    respawnQueue.push({ time: 10.0, pos: savedOrigin }); 
                    continue;
                }

                if (h.isGrowing) {
                    h.growth += delta * 6.5; h.mesh.scale.set(h.growth, h.growth, h.growth); h.mesh.position.x += (Math.random() - 0.5) * 0.3;
                    if (h.growth >= 3.5) { 
                        camShakeIntensity = 1.3; const savePos = new THREE.Vector3().copy(h.body.position);
                        const savedOrigin = Object.assign({}, h.originPos);
                        scene.remove(h.mesh); world.remove(h.body); horses.splice(i, 1);
                        spawnSparkFlash(savePos, 60, 3); sliceHorseIntoPieces(savePos, 64, giantMat);
                        respawnQueue.push({ time: 10.0, pos: savedOrigin });
                        continue; 
                    }
                } else {
                    h.mesh.position.copy(h.body.position); h.mesh.quaternion.copy(h.body.quaternion);
                }

                if (h.state === "hammer_flat") {
                    h.timer -= delta; h.mesh.scale.set(1.8, 0.01, 1.8); h.body.velocity.set(0, -10, 0);
                    if (h.timer <= 0) { h.state = "normal"; h.mesh.scale.set(1, 1, 1); h.body.velocity.y = 55; }
                }
                else if (h.state === "plasma_xray") { h.timer -= delta; if (h.timer <= 0) { h.state = "normal"; h.normal.visible = true; h.xray.visible = false; } }
                else if (h.state === "magnet_shake") { h.shakeTime -= delta; h.mesh.rotation.z = Math.sin(Date.now() * 0.08) * 1.2; h.body.velocity.x += (Math.random()-0.5)*6; if (h.shakeTime <= 0) { h.state = "normal"; h.body.applyImpulse(new CANNON.Vec3(0, -45, 0), h.body.position); } }
            }

            if (playerBody.position.z < nextPlatformZ + 180) spawnPlatform();
            if (playerBody.position.y < -35) { playerBody.position.set(0, 6, 0); playerBody.velocity.set(0,0,0); }

            document.getElementById('height-score').innerText = Math.max(0, Math.floor(playerBody.position.y));
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
